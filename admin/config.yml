backend:
  name: git-gateway
  branch: main

media_folder: "images/productos"
public_folder: "/images/productos"

collections:
  - name: "productos"
    label: "Productos"
    label_singular: "Producto"
    folder: "productos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre del Producto", name: "nombre", widget: "string", required: true }
      - { label: "Precio", name: "precio", widget: "string", required: true, hint: "Ej: $1,299 MXN" }
      - { label: "Descripción", name: "descripcion", widget: "text", required: true }
      - { label: "Imagen", name: "imagen", widget: "image", required: true, hint: "📸 Haz clic para subir la foto del tenis" }
      - { label: "Orden", name: "orden", widget: "number", default: 0, required: false, hint: "Número más bajo = aparece primero" }